<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NexaboxDrive</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button { padding: 8px 15px; cursor: pointer; margin-right: 5px; }
        #log { white-space: pre-wrap; background: #f4f4f4; padding: 10px; font-size: 12px; }
        .folder-link { font-weight: bold; text-decoration: none; color: #0078d4; cursor: pointer; }
        .folder-link:hover { text-decoration: underline; }
        ul { list-style-type: none; padding-left: 0; }
        li { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>
    <h1>NexaboxDrive</h1>

    <div class="card" style="background-color: #f9f9f9;">
        <h3 style="margin-top: 0;">当前路径: <span id="pathDisplay">/</span></h3>
        <button id="btnGoUp" onclick="goUp()" style="display: none;">返回上一级</button>
        <button onclick="createFolder()">新建文件夹</button>
        <button onclick="loadFiles()">刷新列表</button>
    </div>

    <div class="card">
        <h3>上传文件到当前目录</h3>
        <input type="file" id="fileInput" />
        <button onclick="startUpload()">开始切片上传</button>
        <p id="uploadStatus">就绪</p>
    </div>

    <div class="card">
        <h3>文件列表</h3>
        <ul id="fileList"></ul>
    </div>

    <h4>运行日志</h4>
    <div id="log"></div>

  <script>
        const ACCOUNT_URL = 'https://accounts.nexabox.de'; 
        const APP_NAME = 'NexaboxDrive';
        
        // --- 新增：全局路径状态 ---
        let currentPath = '/';
    
        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get('token');
    
            if (tokenFromUrl) {
                localStorage.setItem('pan_token', tokenFromUrl);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
    
            const token = localStorage.getItem('pan_token');
            if (!token) {
                const currentUrl = encodeURIComponent(window.location.href);
                window.location.href = `${ACCOUNT_URL}/login.html?app=${APP_NAME}&redirect=${currentUrl}`;
                return null;
            }
            return token;
        }
    
        const token = checkAuth();
    
        async function apiFetch(url, options = {}) {
            if (!options.headers) options.headers = {};
            options.headers['Authorization'] = `Bearer ${token}`; 
            
            const res = await fetch(url, options);
            if (res.status === 401 || res.status === 403) {
                alert('登录已过期或无访问权限，请重新登录！');
                localStorage.removeItem('pan_token');
                window.location.reload();
            }
            return res;
        }
      
      const CHUNK_SIZE = 250 * 1024 * 1024; 
      const OSS_BASE_URL = 'https://teachermate.oss-cn-qingdao.aliyuncs.com/';
  
      function log(msg) {
          document.getElementById('log').innerText += msg + '\n';
          console.log(msg);
      }
  
      async function initServiceWorker() {
          if ('serviceWorker' in navigator) {
              try {
                  await navigator.serviceWorker.register('/sw.js');
                  log("Service Worker 注册成功！");
                  if (!navigator.serviceWorker.controller) {
                      await new Promise(resolve => navigator.serviceWorker.addEventListener('controllerchange', resolve));
                  }
              } catch (err) { log(`Service Worker 注册失败: ${err}`); }
          }
      }
      
      window.onload = async () => {
          await initServiceWorker();
          loadFiles();
      };
  
      // --- 文件夹与路径导航逻辑 ---
      
      async function createFolder() {
          const folderName = prompt("请输入文件夹名称：");
          if (!folderName) return;
          
          try {
              const res = await apiFetch('/api/folder', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name: folderName, path: currentPath })
              });
              const data = await res.json();
              if (data.success) {
                  log(`文件夹 ${folderName} 创建成功`);
                  loadFiles();
              } else {
                  alert(data.error);
              }
          } catch (e) { alert("创建文件夹失败"); }
      }

      function enterFolder(folderName) {
          if (currentPath === '/') {
              currentPath = `/${folderName}/`;
          } else {
              currentPath = `${currentPath}${folderName}/`;
          }
          loadFiles();
      }

      function goUp() {
          if (currentPath === '/') return;
          const parts = currentPath.split('/').filter(p => p !== '');
          parts.pop(); // 弹出当前目录
          currentPath = parts.length === 0 ? '/' : '/' + parts.join('/') + '/';
          loadFiles();
      }

      // --- 文件上传逻辑 ---
      async function startUpload() {
          const fileInput = document.getElementById('fileInput');
          if (!fileInput.files.length) return alert("请先选择一个文件！");
          
          const file = fileInput.files[0];
          const originalName = file.name;
          const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
          const chunkUrls = [];
  
          log(`开始上传到 ${currentPath} : ${originalName}`);
          document.getElementById('uploadStatus').innerText = `正在上传... (0/${totalChunks})`;
  
          for (let i = 0; i < totalChunks; i++) {
              const start = i * CHUNK_SIZE;
              const end = Math.min(start + CHUNK_SIZE, file.size);
              const chunkBlob = file.slice(start, end, 'image/png');
              
              const chunkIndex = String(i + 1).padStart(3, '0');
              const fakeFileName = `${originalName}.${chunkIndex}.png`;
              
              try {
                  const sigRes = await apiFetch('/api/signature');
                  const ossData = await sigRes.json();
                  if (!ossData.signature) throw new Error("获取签名失败");
  
                  const timestamp = new Date().getTime();
                  const nameWithoutExt = fakeFileName.substring(0, fakeFileName.lastIndexOf('.')); 
                  const ossKey = `${nameWithoutExt}-${timestamp}-${fakeFileName}`;
  
                  const formData = new FormData();
                  formData.append('Signature', ossData.signature);
                  formData.append('OSSAccessKeyId', ossData.accessKeyId);
                  formData.append('policy', ossData.policy);
                  formData.append('success_action_status', '200');
                  formData.append('key', ossKey);
                  formData.append('file', chunkBlob, fakeFileName);
  
                  const ossHost = ossData.host || OSS_BASE_URL;
                  const uploadRes = await apiFetch(ossHost, { method: 'POST', body: formData });
  
                  if (uploadRes.status === 200 || uploadRes.status === 204) {
                      chunkUrls.push(`${OSS_BASE_URL}${ossKey}`);
                      document.getElementById('uploadStatus').innerText = `正在上传... (${i+1}/${totalChunks})`;
                  } else {
                      throw new Error(`OSS 上传失败: ${uploadRes.status}`);
                  }
              } catch (e) {
                  log(`[错误] 分块上传中断: ${e.message}`);
                  document.getElementById('uploadStatus').innerText = "上传失败";
                  return;
              }
          }
  
          // 保存元数据，携带 path
          await apiFetch('/api/files', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  filename: originalName,
                  size: file.size,
                  chunks: chunkUrls,
                  path: currentPath // 注入当前目录
              })
          });
  
          document.getElementById('uploadStatus').innerText = "上传完成！";
          loadFiles(); 
      }
      
      // --- 加载文件列表 ---
      async function loadFiles() {
            // 更新 UI 状态
            document.getElementById('pathDisplay').innerText = currentPath;
            document.getElementById('btnGoUp').style.display = currentPath === '/' ? 'none' : 'inline-block';

            // 带上 path 过滤参数
            const res = await apiFetch(`/api/files?path=${encodeURIComponent(currentPath)}`);
            const files = await res.json();
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            if (files.length === 0) {
                list.innerHTML = '<li style="color: #999;">当前目录为空</li>';
                return;
            }
    
            files.forEach(f => {
                const li = document.createElement('li');
                
                if (f.isFolder) {
                    // 如果是文件夹，渲染为可点击的目录链接
                    li.innerHTML = `
                        <a class="folder-link" onclick="enterFolder('${f.filename}')">${f.filename}</a>
                        <button style="margin-top:5px; margin-left:10px;" onclick="createShare('${f.id}')">生成分享链接</button>
                    `;
                } else {
                    // 如果是文件，渲染常规下载与分享按钮
                    li.innerHTML = `
                        <strong>${f.filename}</strong> (${(f.size/1024/1024).toFixed(2)} MB) <br>
                        <button style="margin-top:5px;" onclick="downloadStream('${f.id}')">流式下载</button>
                        <button style="margin-top:5px;" onclick="createShare('${f.id}')">生成分享链接</button> 
                    `;
                }
                list.appendChild(li);
            });
        }
    
        async function createShare(fileId) {
            const pwdInput = prompt("请输入提取码（选填，留空则为公开分享）：");
            if (pwdInput === null) return; 
            const password = pwdInput.trim();
            try {
                const res = await apiFetch('/api/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileId, password })
                });
                const data = await res.json();
                if (data.success) {
                    const fullShareUrl = window.location.origin + data.url;
                    let msg = `分享链接已生成：\n${fullShareUrl}`;
                    if (password) msg += `\n提取码：${password}`;
                    prompt("请复制分享信息：", msg);
                } else {
                    alert("生成失败：" + (data.error || "未知错误"));
                }
            } catch (e) { alert("请求分享接口失败！"); }
        }
  
      async function downloadStream(fileId) {
          if (!navigator.serviceWorker.controller) return alert("Service Worker 未就绪，请刷新重试！");
          
          // 在带有 path 的情况下，后端需要从全量列表中去找该文件，为了安全和效率，这里我们仍然复用之前的数据
          // 因为列表数据只包含当前目录，我们可以在内存中查找当前目录的渲染数据
          const res = await apiFetch(`/api/files?path=${encodeURIComponent(currentPath)}`);
          const files = await res.json();
          const fileData = files.find(f => f.id === fileId);
  
          if (!fileData) return alert("文件数据丢失");
  
          const taskId = `task_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
          navigator.serviceWorker.controller.postMessage({
              type: 'PREPARE_DOWNLOAD', id: taskId,
              filename: fileData.filename, chunks: fileData.chunks, size: fileData.size
          });
  
          log("唤起浏览器下载引擎...");
          setTimeout(() => {
              const iframe = document.createElement('iframe');
              iframe.style.display = 'none';
              iframe.src = `/virtual-download/${taskId}`; 
              document.body.appendChild(iframe);
              setTimeout(() => { document.body.removeChild(iframe); }, 10000);
          }, 300);
      }
  </script>
</body>
</html>
