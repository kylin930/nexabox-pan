<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NexaboxDrive - 文件预览与提取</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .preview-container { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        
        /* 预览组件样式 */
        video, audio { width: 100%; max-height: 450px; border-radius: 8px; background: #000; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        pre { text-align: left; background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 14px; line-height: 1.5; max-height: 500px; }
        
        #errorMsg { color: #d83b01; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>文件分享</h2>
        <h3 id="filename">加载中...</h3>
        <p id="filesize"></p>
        
        <div id="pwdContainer" style="display:none;">
            <input type="text" id="pwdInput" placeholder="请输入提取码">
            <br>
            <button class="btn btn-primary" onclick="unlockShare()">验证并预览</button>
        </div>

        <div id="actionButtons" style="display:none;">
            <button id="btnDownload" class="btn btn-primary" onclick="startShareDownload()">立即下载</button>
            <button id="btnBatchDownload" class="btn btn-primary" style="display:none;" onclick="downloadFolder()">一键保存到本地</button>
            <div id="previewStatus">正在准备...</div>
        </div>

        <div id="previewArea" class="preview-container"></div>
        
        <div id="folderArea" class="preview-container" style="text-align: left; display: none;">
            <h4 style="margin-top:0;">文件夹包含内容：</h4>
            <ul id="folderFileList" style="list-style:none; padding:0; font-size:14px; max-height:400px; overflow-y:auto;"></ul>
        </div>

        <p id="errorMsg"></p>
    </div>

    <script>
        let fileData = null;
        const shareId = new URLSearchParams(window.location.search).get('id');

        async function initSW() {
            if (!('serviceWorker' in navigator)) return alert("浏览器不支持预览所需技术");
            await navigator.serviceWorker.register('/sw.js');
            await navigator.serviceWorker.ready;
        }

        async function loadInfo() {
            try {
                const res = await fetch(`/api/public/share?id=${shareId}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                document.getElementById('filename').innerText = data.isFolder ? `📁 ${data.filename}` : data.filename;
                document.getElementById('filesize').innerText = data.isFolder ? `类型：文件夹` : `大小: ${(data.size/1024/1024).toFixed(2)} MB`;
                
                if (data.needPassword) {
                    document.getElementById('pwdContainer').style.display = 'block';
                } else {
                    await fetchFullData(null);
                }
            } catch (e) { document.getElementById('errorMsg').innerText = e.message; }
        }

        async function unlockShare() {
            const pwd = document.getElementById('pwdInput').value.trim();
            await fetchFullData(pwd);
        }

        async function fetchFullData(password) {
            try {
                const res = await fetch(`/api/public/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: shareId, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                fileData = data;
                document.getElementById('pwdContainer').style.display = 'none';
                document.getElementById('actionButtons').style.display = 'block';
                
                setupPreview();
            } catch (e) { document.getElementById('errorMsg').innerText = e.message; }
        }

        async function setupPreview() {
            // 如果是文件夹分享
            if (fileData.isFolder) {
                document.getElementById('btnDownload').style.display = 'none';
                document.getElementById('btnBatchDownload').style.display = 'inline-block';
                document.getElementById('previewArea').style.display = 'none';
                
                const folderArea = document.getElementById('folderArea');
                const list = document.getElementById('folderFileList');
                folderArea.style.display = 'block';
                
                const fileCount = fileData.children.filter(c => !c.isFolder).length;
                document.getElementById('previewStatus').innerText = `共 ${fileCount} 个文件，已支持保留路径结构批量下载`;
                
                list.innerHTML = '';
                fileData.children.forEach(c => {
                    const li = document.createElement('li');
                    li.style.padding = "8px 0";
                    li.style.borderBottom = "1px solid #eee";
                    if (c.isFolder) {
                         li.innerHTML = `<strong>${c.filename}</strong> <span style="color:#888;">(子目录)</span>`;
                    } else {
                         li.innerHTML = `<strong>${c.filename}</strong> <span style="color:#888; margin-left:10px;">${(c.size/1024/1024).toFixed(2)} MB | 位置: ${c.path}</span>`;
                    }
                    list.appendChild(li);
                });
                return;
            }

            // 单文件预览逻辑保持不变
            const name = fileData.filename.toLowerCase();
            const previewArea = document.getElementById('previewArea');
            const status = document.getElementById('previewStatus');
            
            const taskId = `preview_${Date.now()}`;
            navigator.serviceWorker.controller.postMessage({
                type: 'PREPARE_DOWNLOAD', id: taskId,
                filename: fileData.filename, chunks: fileData.chunks, size: fileData.size, isPreview: true
            });
            const streamUrl = `/virtual-download/${taskId}`;

            previewArea.style.display = 'block';
            status.innerText = "支持预览此类型文件";

            if (/\.(mp4|webm|ogg|mov)$/.test(name)) {
                previewArea.innerHTML = `<video controls src="${streamUrl}"></video>`;
            } else if (/\.(mp3|wav|flac|aac)$/.test(name)) {
                previewArea.innerHTML = `<audio controls src="${streamUrl}"></audio>`;
            } else if (/\.(jpg|jpeg|png|gif|webp|svg)$/.test(name)) {
                previewArea.innerHTML = `<img src="${streamUrl}" alt="Preview">`;
            } else if (/\.(txt|md|js|css|json|cpp|py)$/.test(name)) {
                try {
                    status.innerText = "正在读取文本内容...";
                    const textRes = await fetch(streamUrl);
                    const content = await textRes.text();
                    const safeContent = content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    previewArea.innerHTML = `<pre><code>${safeContent}</code></pre>`;
                    status.innerText = "文本预览已就绪";
                } catch (e) { status.innerText = "文本读取失败"; }
            } else {
                previewArea.style.display = 'none';
                status.innerText = "此文件类型不支持在线预览，请下载后查看。";
            }
        }

        function startShareDownload() {
            const taskId = `dl_${Date.now()}`;
            navigator.serviceWorker.controller.postMessage({
                type: 'PREPARE_DOWNLOAD', id: taskId,
                filename: fileData.filename, chunks: fileData.chunks, size: fileData.size
            });
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = `/virtual-download/${taskId}`;
            document.body.appendChild(iframe);
        }

        // 新增核心黑科技：保留路径层级的硬盘直写下载 (支持超大文件)
        async function downloadFolder() {
            if (!window.showDirectoryPicker) {
                return alert("您的浏览器不支持一键批量直写，请使用最新版 Chrome、Edge 浏览器！");
            }
            try {
                // 1. 让用户授权并选择一个本地用来存放的文件夹
                const rootHandle = await window.showDirectoryPicker({
                    mode: 'readwrite'
                });
                
                const statusStr = document.getElementById('previewStatus');
                const rootPath = fileData.fullPath; // 例如 "/photos/"
                const filesToDownload = fileData.children.filter(c => !c.isFolder);
                
                let downloaded = 0;
                
                // 2. 遍历所有文件，利用 SW 流写入硬盘
                for (const file of filesToDownload) {
                    statusStr.innerText = `批量下载中... (${downloaded + 1}/${filesToDownload.length}) -> ${file.filename}`;
                    
                    // 计算相对路径。例如 file.path 是 "/photos/summer/"，rootPath 是 "/photos/"
                    // 剥离出 "summer/" 方便我们逐级在本地创建子文件夹
                    const relPath = file.path.startsWith(rootPath) ? file.path.substring(rootPath.length) : "";
                    const pathParts = relPath.split('/').filter(p => p !== '');
                    
                    let currentHandle = rootHandle;
                    for (const part of pathParts) {
                        currentHandle = await currentHandle.getDirectoryHandle(part, { create: true });
                    }
                    
                    // 在指定的层级创建空文件准备写入
                    const fileHandle = await currentHandle.getFileHandle(file.filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    
                    // 通过 SW 获取已拼接好的 OSS 流数据
                    const taskId = `dl_batch_${Math.random().toString(36).substr(2, 9)}`;
                    navigator.serviceWorker.controller.postMessage({
                        type: 'PREPARE_DOWNLOAD', id: taskId,
                        filename: file.filename, chunks: file.chunks, size: file.size
                    });
                    
                    const res = await fetch(`/virtual-download/${taskId}`);
                    // 管线对接：把虚拟流数据源源不断地泵入用户本地硬盘
                    await res.body.pipeTo(writable);
                    
                    downloaded++;
                }
                
                statusStr.innerText = "✨ 批量下载完成！";
                alert("文件夹下载成功，请前往您选择的本地文件夹查看。");
                
            } catch (e) {
                console.error(e);
                // 报错大概率是用户取消了选择文件夹授权
                document.getElementById('previewStatus').innerText = "下载被取消或发生错误。";
            }
        }

        window.onload = async () => {
            await initSW();
            await loadInfo();
        };
    </script>
</body>
</html>
